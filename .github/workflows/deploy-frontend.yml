name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - 'packages/frontend/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      # Remove stale chunks from the previous release before uploading the new
      # build. Nginx serves files directly from disk so there is no reload step.
      - name: Clear previous dist on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          password: ${{ secrets.LINODE_PASSWORD }}
          script: rm -rf /home/muzzle.lol/mocker/packages/frontend/dist

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          password: ${{ secrets.LINODE_PASSWORD }}
          # strip_components: 3 removes the leading packages/frontend/dist path
          # elements so files land at the correct target path on the server.
          source: 'packages/frontend/dist/'
          target: '/home/muzzle.lol/mocker/packages/frontend/dist'
          strip_components: 3
