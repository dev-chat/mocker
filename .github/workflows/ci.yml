name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  setup:
    name: Install Dependencies (All)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: tar -czf node-modules.tar.gz node_modules
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node-modules.tar.gz
          retention-days: 1

  lint:
    name: Lint (Back End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run lint

  lint-frontend:
    name: Lint (Front End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run lint -w @mocker/frontend

  format-check:
    name: Format Check (All)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run format:check

  build:
    name: Build (Back End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build:backend

  build-frontend:
    name: Build (Front End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build:frontend

  test:
    name: Test & Coverage (Back End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Enforce 80% coverage
        run: npm run test:coverage

  test-frontend:
    name: Test & Coverage (Front End)
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Enforce 80% coverage
        run: npm run test:coverage -w @mocker/frontend

  docker-build:
    name: Docker Build (Back End)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f packages/backend/Dockerfile -t muzzle:ci .
