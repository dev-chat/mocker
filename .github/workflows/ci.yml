name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/backend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            frontend:
              - 'packages/frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'

  setup:
    name: Install Dependencies (All)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: tar -czf node-modules.tar.gz node_modules
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node-modules.tar.gz
          retention-days: 1

  lint:
    name: Lint (Back End)
    needs: [changes, setup]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run lint:backend

  lint-frontend:
    name: Lint (Front End)
    needs: [changes, setup]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run lint -w @mocker/frontend

  format-check:
    name: Format Check (All)
    needs: [changes, setup]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run format:check

  build:
    name: Build (Back End)
    needs: [changes, setup]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build:backend

  build-frontend:
    name: Build (Front End)
    needs: [changes, setup]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build:frontend

  test:
    name: Test & Coverage (Back End)
    needs: [changes, setup]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Enforce 80% coverage
        run: npm run test:coverage

  test-frontend:
    name: Test & Coverage (Front End)
    needs: [changes, setup]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Enforce 80% coverage
        run: npm run test:coverage -w @mocker/frontend

  docker-build:
    name: Docker Build (Back End)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build Docker image
        run: |
          PREVIOUS_RELEASE_SHA=$(git rev-parse HEAD^ 2>/dev/null || true)
          docker build \
            --build-arg PREVIOUS_RELEASE_SHA="$PREVIOUS_RELEASE_SHA" \
            -f packages/backend/Dockerfile \
            -t muzzle:ci \
            .
